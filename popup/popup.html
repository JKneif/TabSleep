<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TabSleep</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>🌙 TabSleep</h1>
    <button id="sleep-all-btn" class="sleep-all">Sleep all</button>
  </header>

  <main>
    <section class="big" aria-live="polite">
      <div class="big-number">
        <span id="alltime-eur">—</span>
        <span class="unit">saved (30 days)</span>
      </div>
      <div class="big-sub">
        <span id="alltime-wh">—</span> Wh
      </div>
      <div class="big-relate" id="relate"></div>
    </section>

    <section class="last7">
      <span class="last7-label">Last 7 days</span>
      <span class="last7-value" id="last7-eur">—</span>
    </section>

    <section class="sleeping">
      <h2>Sleeping tabs <span id="sleeping-count" class="count">0</span></h2>
      <ul id="sleeping-list" class="list"></ul>
      <p id="sleeping-empty" class="empty">No tabs sleeping yet.</p>
    </section>

    <footer>
      <span>All data local · chrome.storage.local</span>
    </footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
